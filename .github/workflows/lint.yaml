name: Lint

# R lintr + C++ clang-tidy. Both are advisory: warnings show up in the
# Actions log and as PR annotations, but the workflow always exits cleanly
# until the project decides on a stricter style baseline.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  r-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libtbb-dev

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::lintr
          needs: lint

      - name: Run lintr (advisory)
        run: |
          lints <- lintr::lint_package()
          if (length(lints) > 0) {
              print(lints)
              cat("\nFound", length(lints), "lint(s). Advisory — not failing the build.\n")
          } else {
              cat("No lints found.\n")
          }
        shell: Rscript {0}

  cpp-tidy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang-tidy cmake ninja-build libtbb-dev

      - name: Generate compile_commands.json
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DFSGEA_WITH_TORCH=OFF \
            -DCMAKE_BUILD_TYPE=Release

      - name: clang-tidy (advisory)
        run: |
          shopt -s nullglob
          clang-tidy -p build --quiet \
              bench/*.cpp src/*.cpp tests/cpp/*.cpp || true
