name: Lint

# R lintr + C++ clang-tidy. Both are advisory: warnings show up in the
# Actions log and the PR annotations, but don't fail the build until the
# project decides on a stricter style baseline.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  r-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::lintr, local::.
          needs: lint

      - name: lintr
        run: lintr::lint_package()
        shell: Rscript {0}
        env:
          LINTR_ERROR_ON_LINT: 'false'

  cpp-tidy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang-tidy cmake ninja-build libtbb-dev

      - name: Generate compile_commands.json
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DFSGEA_WITH_TORCH=OFF \
            -DCMAKE_BUILD_TYPE=Release

      - name: clang-tidy (advisory)
        run: |
          # Report warnings on every translation unit in the project, but
          # exit cleanly. Tighten with `-warnings-as-errors=*` once the
          # codebase reaches a steady-state style.
          shopt -s globstar nullglob
          clang-tidy -p build --quiet \
              bench/*.cpp src/*.cpp tests/cpp/*.cpp || true
