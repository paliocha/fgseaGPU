name: Lint

# R lintr + C++ clang-tidy. Both are advisory: warnings show up in the
# Actions log and as PR annotations, but the workflow always exits cleanly
# until the project decides on a stricter style baseline.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  r-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libtbb-dev

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::lintr
          needs: lint

      - name: Run lintr (advisory)
        # NB: we deliberately format lints by hand. Calling `print()` on a
        # lints object invokes lintr's GitHub-Actions reporter, which calls
        # `quit(status = 1)` whenever it prints anything — regardless of
        # the LINTR_ERROR_ON_LINT env var. Iterating with `message()`
        # bypasses that path and keeps the job advisory.
        env:
          LINTR_ERROR_ON_LINT: "false"
        run: |
          lints <- tryCatch(
              lintr::lint_package(),
              error = function(e) {
                  message("lintr error: ", conditionMessage(e))
                  list()
              }
          )
          n <- length(lints)
          if (n > 0) {
              message(sprintf("Found %d lint(s):", n))
              for (l in lints) {
                  message(sprintf("  %s:%d [%s] %s",
                                  l$filename, l$line_number,
                                  l$type, l$message))
              }
              message("\n(advisory — not failing the build)")
          } else {
              message("No lints found.")
          }
          quit(save = "no", status = 0)
        shell: Rscript {0}

  cpp-tidy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang-tidy cmake ninja-build libtbb-dev

      - name: Generate compile_commands.json
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DFSGEA_WITH_TORCH=OFF \
            -DCMAKE_BUILD_TYPE=Release

      - name: clang-tidy (advisory)
        run: |
          shopt -s nullglob
          clang-tidy -p build --quiet \
              bench/*.cpp src/*.cpp tests/cpp/*.cpp || true
